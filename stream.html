                { name: "Physics", si: "а¶·а·һа¶ӯа·’а¶ҡ а·Җа·’а¶Ҝа·ҠвҖҚа¶әа·Ҹа·Җ", id: "physics", icon: "вҡӣпёҸ" },
                { name: "Biology", si: "а¶ўа·“а·Җ а·Җа·’а¶Ҝа·ҠвҖҚа¶әа·Ҹа·Җ", id: "biology", icon: "рҹ§¬" }

                { name: "Geography", si: "а¶·а·–а¶ңа·қа¶Ҫ а·Җа·’а¶Ҝа·ҠвҖҚа¶әа·Ҹа·Җ", id: "geography", icon: "рҹҢҚ" },

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'si' : 'en';
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'а·ға·’а¶Ӯа·„а¶Ҫ' : 'English';
            document.querySelector('html').classList.toggle('sinhala', currentLang === 'si');
            updateContent();
        }

        function updateContent() {
            const t = translations[currentLang];
            document.getElementById('headerTitle').textContent = t.title;
            document.getElementById('headerSubtitle').textContent = t.subtitle;
            document.getElementById('footerText').textContent = t.footerText;
            document.getElementById('homeLink').textContent = t.homeLink;
            document.getElementById('adminLink').textContent = t.adminLink;
            
            const stream = new URLSearchParams(window.location.search).get('stream');
            document.getElementById('streamTitle').textContent = t[stream] || stream.charAt(0).toUpperCase() + stream.slice(1);
            loadSubjects(stream);
        }

        function loadSubjects(stream) {
            const subjectList = subjects[stream] || [];
            const subjectsSection = document.getElementById('subjects');
            subjectsSection.innerHTML = '';
            
            subjectList.forEach((subject, index) => {
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-xl shadow-md card-hover animate__animated animate__fadeInUp animate__delay-${index+1}s`;
                card.innerHTML = `
                    <div class="flex items-start">
                        <span class="text-3xl mr-4">${subject.icon}</span>
                        <div>
                            <h3 class="text-lg font-semibold text-emerald-800">${currentLang === 'en' ? subject.name : subject.si}</h3>
                            <a href="subject.html?stream=${stream}&subject=${subject.id}" class="mt-4 inline-flex items-center bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">

                                </svg>
                            </a>
                        </div>
                    </div>
                `;
                subjectsSection.appendChild(card);
            });
        }

        document.getElementById('langToggle').addEventListener('click', toggleLanguage);
        updateContent();
    </script>
