<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Stream Subjects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sinhala:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
@media (max-width: 768px) {
    /* Mobile specific styles */
    .your-custom-class {
        font-size: 14px;
        padding: 10px;
        /* Add more mobile-specific styles here */
    }
}
        /* Base body and font styles */
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            color: #333;
        }
        .sinhala { font-family: 'Noto Sinhala', sans-serif; }

        /* Gradient for header and footer */
        .gradient-header {
            background: linear-gradient(135deg, #047857 0%, #065f46 100%);
        }

        /* Card hover effects */
        .card-hover {
            transition: all 0.3s ease;
            transform: translateY(0);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header Section -->
    <header class="gradient-header text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <div class="animate__animated animate__fadeInLeft">
                    <h1 class="text-3xl md:text-4xl font-bold" id="headerTitle">A/L Past Papers & Marking Schemes</h1>
                    <p class="mt-2 text-emerald-100" id="headerSubtitle">Select a subject</p>
                </div>
                <!-- Language Toggle Button -->
                <button id="langToggle" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-md text-sm font-medium transition-colors animate__animated animate__fadeInRight">
                    සිංහල
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="animate__animated animate__fadeIn">
            <!-- Back button and Stream Title -->
            <div class="flex items-center mb-6">
                <a href="index.html" class="text-emerald-600 hover:text-emerald-800 font-medium flex items-center mr-4 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span id="backToHome">Back to Home</span>
                </a>
                <h2 id="streamTitle" class="text-2xl md:text-3xl font-bold border-b-2 border-current pb-2 flex-grow"></h2>
            </div>
            
            <!-- Subjects Grid -->
            <section id="subjects" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="gradient-header text-white py-6">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <h3 class="text-xl font-bold">A/L Past Papers</h3>
                    <p class="text-emerald-100 mt-1" id="footerText">© 2025 A/L Past Papers. All rights reserved.</p>
                </div>
                <div class="flex space-x-6">
                    <a href="index.html" class="text-emerald-100 hover:text-white transition-colors" id="homeLink">Home</a>
                    <a href="subject.html" class="text-emerald-100 hover:text-white transition-colors" id="subjectLink">Subject</a>
                    <a href="contact.html" class="text-emerald-100 hover:text-white transition-colors" id="contactLink">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Translations object for multilingual support
        const translations = {
            en: {
                pageTitle: "Stream Subjects",
                headerTitle: "A/L Past Papers & Marking Schemes",
                headerSubtitle: "Select a subject",
                backToHome: "Back to Home",
                science: "Science Stream Subjects",
                technology: "Technology Stream Subjects",
                commerce: "Commerce Stream Subjects",
                arts: "Arts Stream Subjects",
                footerText: "© 2025 A/L Past Papers. All rights reserved.",
                homeLink: "Home",
                subjectLink: "Subject",
                contactLink: "Contact",
                viewPapers: "View Papers"
            },
            si: {
                pageTitle: "විෂය ධාරාවේ විෂයන්",
                headerTitle: "උසස් පෙළ පසුගිය ප්‍රශ්න පත්ර හා ලකුණු ලේඛන",
                subtitle: "විෂයක් තෝරන්න",
                backToHome: "මුල් පිටුවට",
                science: "විද්‍යා විෂය ධාරාවේ විෂයන්",
                technology: "තාක්ෂණික විෂය ධාරාවේ විෂයන්",
                commerce: "වාණිජ විෂය ධාරාවේ විෂයන්",
                arts: "කලා විෂය ධාරාවේ විෂයන්",
                footerText: "© 2025 උසස් පෙළ පසුගිය ප්‍රශ්න පත්ර. සියලු හිමිකම් ඇවිරිණි.",
                homeLink: "මුල් පිටුව",
                subjectLink: "විෂයන්",
                contactLink: "අප අමතන්න",
                viewPapers: "ප්‍රශ්න පත්‍ර බලන්න"
            }
        };

        // Data structure for subjects, including their icons
        const subjects = {
            science: [
                { name: "Combined Mathematics", si: "සංයුක්ත ගණිතය", id: "combined-maths", icon: "🧮" },
                { name: "Chemistry", si: "රසායන විද්‍යාව", id: "chemistry", icon: "⚗️" },
                { name: "Physics", si: "භෞතික විද්‍යාව", id: "physics", icon: "⚛️" },
                { name: "Biology", si: "ජීව විද්‍යාව", id: "biology", icon: "🧬" }
            ],
            technology: [
                { name: "Engineering Technology", si: "ඉංජිනේරු තාක්ෂණය", id: "engineering-tech", icon: "⚙️" },
                { name: "Bio-Systems Technology", si: "ජෛව පද්ධති තාක්ෂණය", id: "bio-systems-tech", icon: "🌱" },
                { name: "Science for Technology", si: "තාක්ෂනවේදය සඳහා විද්‍යාව", id: "science-for-tech", icon: "🔬" },
                { name: "Geography", si: "භූගෝල විද්‍යාව", id: "geography", icon: "🌍" },
                { name: "Agriculture", si: "කෘෂි විද්‍යාව", id: "agriculture", icon: "🚜" },
                { name: "Information & Communication Technology", si: "සන්නිවේදන තාක්ෂණය", id: "ict", icon: "💻" }
            ],
            commerce: [
                { name: "Accounting", si: "ගිණුම්කරණය", id: "accounting", icon: "📊" },
                { name: "Business Studies", si: "ව්‍යාපාර අධ්‍යයනය", id: "business-studies", icon: "🏢" },
                { name: "Economics", si: "ආර්ථික විද්‍යාව", id: "economics", icon: "💹" },
                { name: "Information & Communication Technology", si: "තොරතුරු හා සන්නිවේදන තාක්ෂණය", id: "ict", icon: "💻" }
            ],
            arts: [
                { name: "Sinhala", si: "සිංහල", id: "sinhala", icon: "📜" },
                { name: "Political Science", si: "දේශපාලන විද්‍යාව", id: "political-science", icon: "🏛️" },
                { name: "History", si: "ඉතිහාසය", id: "history", icon: "🕰️" },
                { name: "Geography", si: "භූගෝල විද්‍යාව", id: "geography", icon: "🌍" },
                { name: "Communication & Media Studies", si: "සන්නිවේදනය හා මාධ්‍ය අධ්‍යයනය", id: "media-studies", icon: "📡" },
                { name: "Religion", si: "ආගම", id: "religion", icon: "🕉️" },
                { name: "Dance", si: "නර්තනය", id: "dance", icon: "💃" },
                { name: "Drama & Theatre", si: "නාට්‍ය හා රංගකලා", id: "drama", icon: "🎭" },
                { name: "Music", si: "සංගීතය", id: "music", icon: "🎵" },
                { name: "English Literature", si: "ඉංග්‍රීසි සාහිත්‍යය", id: "english-literature", icon: "📖" }
            ]
        };

        // Stream color mapping for dynamic styling
        const streamColors = {
            science: {
                bg: 'bg-red-100',
                text: 'text-red-600',
                hoverBg: 'hover:bg-red-700',
                buttonBg: 'bg-red-600',
                titleText: 'text-red-800',
                borderColor: 'border-red-200'
            },
            technology: {
                bg: 'bg-green-100',
                text: 'text-green-600',
                hoverBg: 'hover:bg-green-700',
                buttonBg: 'bg-green-600',
                titleText: 'text-green-800',
                borderColor: 'border-green-200'
            },
            commerce: {
                bg: 'bg-blue-100',
                text: 'text-blue-600',
                hoverBg: 'hover:bg-blue-700',
                buttonBg: 'bg-blue-600',
                titleText: 'text-blue-800',
                borderColor: 'border-blue-200'
            },
            arts: {
                bg: 'bg-yellow-100',
                text: 'text-yellow-600',
                hoverBg: 'hover:bg-yellow-700',
                buttonBg: 'bg-yellow-600',
                titleText: 'text-yellow-800',
                borderColor: 'border-yellow-200'
            }
        };

        let currentLang = 'en'; // Default language

        // Function to toggle language
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'si' : 'en';
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'සිංහල' : 'English';
            document.querySelector('html').classList.toggle('sinhala', currentLang === 'si');
            updateContent(); // Update all dynamic content
        }

        // Function to update all text content based on current language
        function updateContent() {
            const t = translations[currentLang];
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('headerTitle').textContent = t.headerTitle;
            document.getElementById('headerSubtitle').textContent = t.subtitle;
            document.getElementById('footerText').textContent = t.footerText;
            document.getElementById('homeLink').textContent = t.homeLink;
            document.getElementById('subjectLink').textContent = t.subjectLink;
            document.getElementById('contactLink').textContent = t.contactLink;
            document.getElementById('backToHome').textContent = t.backToHome;
            
            const stream = new URLSearchParams(window.location.search).get('stream');
            
            // Set stream title, defaulting to capitalized stream name if no translation exists
            const streamTitleElement = document.getElementById('streamTitle');
            streamTitleElement.textContent = t[stream] || stream.charAt(0).toUpperCase() + stream.slice(1) + " Subjects";

            // Apply stream-specific colors to the title
            const colors = streamColors[stream] || {};
            streamTitleElement.className = `text-2xl md:text-3xl font-bold border-b-2 pb-2 flex-grow ${colors.titleText || 'text-emerald-800'} ${colors.borderColor || 'border-emerald-200'}`;

            loadSubjects(stream); // Load and display subjects for the selected stream
        }

        // Function to dynamically load subjects based on stream
        function loadSubjects(stream) {
            const subjectList = subjects[stream] || [];
            const subjectsSection = document.getElementById('subjects');
            subjectsSection.innerHTML = ''; // Clear previous subjects

            const colors = streamColors[stream] || {}; // Get colors for the current stream

            if (subjectList.length === 0) {
                subjectsSection.innerHTML = `<p class="text-gray-500 text-center col-span-full">No subjects found for this stream.</p>`;
                return;
            }

            subjectList.forEach((subject, index) => {
                const card = document.createElement('div');
                // Apply stream-specific colors dynamically using Tailwind classes
                const iconBgClass = colors.bg || 'bg-emerald-100';
                const iconTextColorClass = colors.text || 'text-emerald-600';
                const titleTextColorClass = colors.titleText || 'text-emerald-800';
                const buttonBgClass = colors.buttonBg || 'bg-emerald-600';
                const buttonHoverBgClass = colors.hoverBg || 'hover:bg-emerald-700';

                card.className = `bg-white p-6 rounded-xl shadow-md card-hover animate__animated animate__fadeInUp animate__delay-${index * 0.1}s`; // Staggered animation delay
                card.innerHTML = `
                    <div class="flex items-start">
                        <div class="${iconBgClass} p-3 rounded-full mr-4">
                            <span class="text-3xl ${iconTextColorClass}">${subject.icon}</span>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold ${titleTextColorClass}">${currentLang === 'en' ? subject.name : subject.si}</h3>
                            <a href="subject.html?stream=${stream}&subject=${subject.id}" class="mt-4 inline-flex items-center ${buttonBgClass} ${buttonHoverBgClass} text-white px-4 py-2 rounded-lg font-medium transition-colors">
                                ${translations[currentLang].viewPapers}
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </a>
                        </div>
                    </div>
                `;
                subjectsSection.appendChild(card);
            });
        }

        // Event listeners for initial page load and language toggle
        document.addEventListener('DOMContentLoaded', () => {
            updateContent(); // Initial content update on page load
        });
        document.getElementById('langToggle').addEventListener('click', toggleLanguage);
    </script>
</body>
</html>
